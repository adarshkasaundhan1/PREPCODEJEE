<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Success - PrepCode Premium</title>
  <style>
    :root{
      --bg:#070d1a;
      --bg2:#0b1426;
      --line:#233354;
      --text:#eaf1ff;
      --muted:#9db0d6;
      --green:#22c55e;
      --green-2:#16a34a;
      --red:#ef4444;
      --blue:#3b82f6;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:Inter,Segoe UI,Arial,sans-serif;
      color:var(--text);
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 20% -10%, #193562 0%, transparent 35%),
        radial-gradient(circle at 100% 0%, #1f2f55 0%, transparent 30%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      padding:18px;
    }

.card{
      width:min(640px, 100%);
      border:1px solid var(--line);
      border-radius:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      padding:24px;
      text-align:center;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }

.icon{
      width:72px;height:72px;border-radius:50%;
      display:grid;place-items:center;
      margin:0 auto 14px;
      font-size:34px;font-weight:900;
      border:1px solid rgba(34,197,94,.45);
      background:rgba(34,197,94,.15);
      color:#b9ffcf;
    }

h1{font-size:30px;margin-bottom:8px}
    p{color:var(--muted);line-height:1.55}
    .meta{
      margin-top:14px;
      font-size:13px;
      color:#bcd2ff;
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px 12px;
      background:rgba(255,255,255,.02);
      text-align:left;
    }

.status{
      margin-top:14px;
      min-height:20px;
      font-size:14px;
      color:#b9ffcf;
    }
    .status.err{color:#fecaca}

.actions{
      margin-top:18px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

.btn{
      border:none;
      border-radius:10px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:700;
      color:#fff;
      background:var(--green-2);
    }
    .btn-outline{
      background:transparent;
      border:1px solid var(--line);
      color:var(--text);
    }
    .btn-blue{
      background:var(--blue);
    }

.small{
      margin-top:12px;
      font-size:12px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>
    <h1>Payment Successful</h1>
    <p>
      Thank you for upgrading to <strong>PrepCode Premium</strong> 🎉<br />
      We’re activating your premium access.
    </p>

<div class="meta" id="paymentMeta">
      Payment details loading...
    </div>

<div id="statusText" class="status">Checking premium activation...</div>

<div class="actions">
      <button class="btn btn-blue" id="goDashboardBtn">Go to Dashboard</button>
      <button class="btn btn-outline" id="goPricingBtn">Back to Plans</button>
      <button class="btn btn-outline" id="refreshBtn">Refresh Status</button>
    </div>

<p class="small">
      If payment is successful but premium is not active yet, wait 10–30 seconds and click refresh.
    </p>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script>
    const statusText = document.getElementById("statusText");
    const paymentMeta = document.getElementById("paymentMeta");

document.getElementById("goDashboardBtn").addEventListener("click", () => {
      window.location.href = "index.html";
    });

document.getElementById("goPricingBtn").addEventListener("click", () => {
      window.location.href = "pricing.html";
    });

document.getElementById("refreshBtn").addEventListener("click", () => {
      checkPremiumStatus();
    });

function getSupabaseClient() {
      return window.PC?.supabase || window.sb || null;
    }

function readPaymentParams() {
      const url = new URL(window.location.href);
      // Razorpay callback may include these depending on flow:
      const paymentId = url.searchParams.get("razorpay_payment_id")
        || url.searchParams.get("payment_id")
        || "N/A";

const paymentLinkId = url.searchParams.get("razorpay_payment_link_id")
        || url.searchParams.get("payment_link_id")
        || "N/A";

const status = url.searchParams.get("razorpay_payment_link_status")
        || url.searchParams.get("status")
        || "paid";

return { paymentId, paymentLinkId, status };
    }

function renderPaymentMeta() {
      const p = readPaymentParams();
      paymentMeta.innerHTML = `
        <div><strong>Status:</strong> ${p.status}</div>
        <div><strong>Payment ID:</strong> ${p.paymentId}</div>
        <div><strong>Payment Link ID:</strong> ${p.paymentLinkId}</div>
      `;
    }

async function getAuthUser() {
      if (window.PC?.getUser) return await window.PC.getUser();
      const sb = getSupabaseClient();
      if (!sb) return null;
      const { data } = await sb.auth.getUser();
      return data?.user || null;
    }

async function checkPremiumStatus() {
      try {
        statusText.classList.remove("err");
        statusText.textContent = "Checking premium activation...";

const user = await getAuthUser();
        if (!user) {
          statusText.classList.add("err");
          statusText.textContent = "Please login first to verify premium access.";
          return;
        }

const sb = getSupabaseClient();
        if (!sb) {
          statusText.classList.add("err");
          statusText.textContent = "Supabase client not found (check supabase-client.js).";
          return;
        }

const { data, error } = await sb
          .from("profiles")
          .select("is_premium, premium_plan, premium_until")
          .eq("id", user.id)
          .maybeSingle();

if (error) {
          statusText.classList.add("err");
          statusText.textContent = error.message || "Failed to fetch premium status.";
          return;
        }

const active = !!data?.is_premium && (
          !data?.premium_until || new Date(data.premium_until) > new Date()
        );

if (active) {
          statusText.textContent = `✅ Premium is active (${data.premium_plan || "plan set"}).`;
        } else {
          statusText.classList.add("err");
          statusText.textContent = "Payment received. Premium activation is in progress. Please refresh in a few seconds.";
        }
      } catch (e) {
        statusText.classList.add("err");
        statusText.textContent = e.message || "Unable to verify status right now.";
      }
    }

// initial
    renderPaymentMeta();
    checkPremiumStatus();

// auto-recheck for first 30 sec
    let attempts = 0;
    const timer = setInterval(async () => {
      attempts += 1;
      await checkPremiumStatus();
      if (attempts >= 6 || statusText.textContent.includes("Premium is active")) {
        clearInterval(timer);
      }
    }, 5000);
  </script>
</body>
</html>
