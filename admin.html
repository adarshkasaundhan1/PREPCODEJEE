<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PrepCode Admin</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0b1426;color:#eaf1ff;margin:0;padding:20px}
    .card{border:1px solid #233354;border-radius:12px;padding:16px;margin-bottom:16px;background:#121f39}
    input,select,textarea,button{padding:10px;border-radius:8px;border:1px solid #2a3b63;background:#0f1a2f;color:#eaf1ff}
    textarea{min-height:80px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(220px,1fr));gap:10px}
    .full{grid-column:1/-1}
    button{cursor:pointer;background:#16a34a;border:none}
    button.secondary{background:#334155}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid #233354;padding:8px;text-align:left;font-size:14px}
    .row-actions button{margin-right:6px}
    .danger{background:#dc2626}
    #status{margin-bottom:12px;padding:10px;border-radius:8px;border:1px solid #233354;background:#0f1a2f}
  </style>
</head>
<body>
  <h1>PrepCode Admin Panel</h1>
  <div id="status">Checking admin access...</div>

<div class="card">
    <h3>Add / Edit Question</h3>
    <form id="qForm" class="grid">
      <input type="hidden" id="qid" />
      <select id="subject" required>
        <option value="">Subject</option>
        <option>Physics</option>
        <option>Chemistry</option>
        <option>Mathematics</option>
      </select>
      <input id="topic" placeholder="Topic" required />
      <select id="difficulty" required>
        <option value="">Difficulty</option>
        <option>Easy</option><option>Medium</option><option>Hard</option>
      </select>
      <input id="marks" type="number" value="4" min="1" required />
      <input id="source" placeholder="Source (optional)" />
      <input id="title" class="full" placeholder="Title" required />
      <textarea id="text" class="full" placeholder="Question text" required></textarea>
      <input id="option_a" placeholder="Option A" required />
      <input id="option_b" placeholder="Option B" required />
      <input id="option_c" placeholder="Option C" required />
      <input id="option_d" placeholder="Option D" required />
      <select id="correct" required>
        <option value="">Correct Option</option>
        <option>A</option><option>B</option><option>C</option><option>D</option>
      </select>
      <input id="explain" class="full" placeholder="Explanation (optional)" />
      <label class="full"><input id="is_active" type="checkbox" checked /> Active</label>
      <div class="full">
        <button type="submit">Save Question</button>
        <button type="button" id="resetBtn" class="secondary">Reset</button>
      </div>
    </form>
  </div>

<div class="card">
    <h3>Questions</h3>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px">
      <select id="fSubject">
        <option value="">All Subjects</option>
        <option>Physics</option><option>Chemistry</option><option>Mathematics</option>
      </select>
      <select id="fDifficulty">
        <option value="">All Difficulty</option>
        <option>Easy</option><option>Medium</option><option>Hard</option>
      </select>
      <button id="refreshBtn" class="secondary" type="button">Refresh</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Subject</th><th>Topic</th><th>Difficulty</th><th>Title</th><th>Active</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="qTable"></tbody>
    </table>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js?v=5"></script>
  <script>
    const sb = window.PC?.supabase || window.sb || null;
    const $ = id => document.getElementById(id);
    const statusEl = $("status");
    const qTable = $("qTable");
    let cachedRows = [];

function setStatus(msg, ok = true) {
      statusEl.textContent = msg;
      statusEl.style.color = ok ? "#86efac" : "#fca5a5";
    }

function escapeHtml(s = "") {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

async function getUserSafe() {
      if (!sb) return null;
      const { data } = await sb.auth.getUser();
      return data?.user || null;
    }

async function ensureAdmin() {
      if (!sb) throw new Error("Supabase client missing.");

let user = await (window.PC?.getUser?.() || getUserSafe());
      if (!user) {
        alert("Please login first.");
        window.location.href = "index.html";
        throw new Error("not_logged_in");
      }

if (window.PC?.canCurrentUserAccessAdmin) {
        const res = await window.PC.canCurrentUserAccessAdmin();
        if (res?.ok && res.canAccess) return user;
      }

if (window.PC?.isAdmin) {
        const res = await window.PC.isAdmin(user.id);
        if (res?.ok && res.isAdmin) return user;
      }

const { data: profile, error } = await sb
        .from("profiles")
        .select("role")
        .eq("id", user.id)
        .maybeSingle();

if (error || !profile || String(profile.role).toLowerCase() !== "admin") {
        alert("Access denied. Admin only.");
        window.location.href = "index.html";
        throw new Error("not_admin");
      }

return user;
    }

function getFormData() {
      return {
        subject: $("subject").value,
        topic: $("topic").value.trim(),
        difficulty: $("difficulty").value,
        marks: Math.max(1, Number($("marks").value || 4)),
        source: $("source").value.trim() || "",
        title: $("title").value.trim(),
        text: $("text").value.trim(),
        option_a: $("option_a").value.trim(),
        option_b: $("option_b").value.trim(),
        option_c: $("option_c").value.trim(),
        option_d: $("option_d").value.trim(),
        correct: $("correct").value.trim().toUpperCase(),
        explain: $("explain").value.trim() || "",
        is_active: $("is_active").checked
      };
    }

function validatePayload(p) {
      if (!p.subject || !p.topic || !p.difficulty || !p.title || !p.text) return "Please fill all required fields.";
      if (!p.option_a || !p.option_b || !p.option_c || !p.option_d) return "All 4 options are required.";
      if (!["A","B","C","D"].includes(p.correct)) return "Correct option must be A/B/C/D.";
      return null;
    }

function fillForm(q) {
      $("qid").value = q.id || "";
      $("subject").value = q.subject || "";
      $("topic").value = q.topic || "";
      $("difficulty").value = q.difficulty || "";
      $("marks").value = q.marks ?? 4;
      $("source").value = q.source || "";
      $("title").value = q.title || "";
      $("text").value = q.text || "";
      $("option_a").value = q.option_a || "";
      $("option_b").value = q.option_b || "";
      $("option_c").value = q.option_c || "";
      $("option_d").value = q.option_d || "";
      $("correct").value = (q.correct || "").toUpperCase();
      $("explain").value = q.explain || "";
      $("is_active").checked = !!q.is_active;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

function resetForm() {
      $("qForm").reset();
      $("qid").value = "";
      $("marks").value = 4;
      $("is_active").checked = true;
    }

async function loadQuestions() {
      let query = sb
        .from("questions")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(300);

const fs = $("fSubject").value;
      const fd = $("fDifficulty").value;
      if (fs) query = query.eq("subject", fs);
      if (fd) query = query.eq("difficulty", fd);

const { data, error } = await query;
      if (error) return setStatus("Load failed: " + error.message, false);

cachedRows = data || [];
      qTable.innerHTML = cachedRows.map(q => `
        <tr>
          <td>${escapeHtml(q.subject)}</td>
          <td>${escapeHtml(q.topic)}</td>
          <td>${escapeHtml(q.difficulty)}</td>
          <td>${escapeHtml(q.title)}</td>
          <td>${q.is_active ? "Yes" : "No"}</td>
          <td class="row-actions">
            <button class="secondary" data-edit="${q.id}" type="button">Edit</button>
            <button class="danger" data-toggle="${q.id}" type="button">${q.is_active ? "Disable" : "Enable"}</button>
            <button class="danger" data-delete="${q.id}" type="button">Delete</button>
          </td>
        </tr>
      `).join("");

qTable.querySelectorAll("[data-edit]").forEach(btn => {
        btn.onclick = () => {
          const q = cachedRows.find(x => String(x.id) === String(btn.dataset.edit));
          if (q) fillForm(q);
        };
      });

qTable.querySelectorAll("[data-toggle]").forEach(btn => {
        btn.onclick = async () => {
          const id = btn.dataset.toggle;
          const row = cachedRows.find(x => String(x.id) === String(id));
          if (!row) return;
          const { error } = await sb
            .from("questions")
            .update({ is_active: !row.is_active })
            .eq("id", id);
          if (error) return setStatus("Toggle failed: " + error.message, false);
          setStatus("Question status updated.");
          await loadQuestions();
        };
      });

qTable.querySelectorAll("[data-delete]").forEach(btn => {
        btn.onclick = async () => {
          if (!confirm("Delete this question permanently?")) return;
          const { error } = await sb
            .from("questions")
            .delete()
            .eq("id", btn.dataset.delete);
          if (error) return setStatus("Delete failed: " + error.message, false);
          setStatus("Question deleted.");
          await loadQuestions();
        };
      });

setStatus(`Loaded ${cachedRows.length} questions.`);
    }

$("qForm").addEventListener("submit", async (e) => {
      e.preventDefault();

const id = $("qid").value.trim();
      const payload = getFormData();
      const err = validatePayload(payload);
      if (err) return setStatus(err, false);

let result;
      if (id) {
        result = await sb
          .from("questions")
          .update(payload)
          .eq("id", id)
          .select()
          .single();
      } else {
        result = await sb
          .from("questions")
          .insert(payload)
          .select()
          .single();
      }

if (result.error) {
        console.error("Save error:", result.error);
        return setStatus("Save failed: " + result.error.message, false);
      }

setStatus(id ? "Question updated successfully." : "Question added successfully.");
      resetForm();
      await loadQuestions();
    });

$("resetBtn").onclick = resetForm;
    $("refreshBtn").onclick = loadQuestions;
    $("fSubject").onchange = loadQuestions;
    $("fDifficulty").onchange = loadQuestions;

(async function init() {
      try {
        await ensureAdmin();
        setStatus("Admin verified.");
        await loadQuestions();
      } catch (e) {
        console.error(e);
        if (e?.message !== "not_logged_in" && e?.message !== "not_admin") {
          setStatus("Init failed: " + (e.message || "Unknown error"), false);
        }
      }
    })();
  </script>
</body>
</html>
