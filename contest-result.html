<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrepCode • Contest Results</title>
  <style>
    :root{
      --bg:#070d1a;
      --bg2:#0b1426;
      --panel:#111b31;
      --panel2:#162442;
      --line:#25385d;
      --text:#eaf1ff;
      --muted:#9db0d6;
      --green:#22c55e;
      --red:#ef4444;
      --yellow:#f59e0b;
      --blue:#3b82f6;
      --purple:#8b5cf6;
    }

*{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Inter,Segoe UI,Arial,sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at 10% -10%, #1d3b67 0%, transparent 35%),
        radial-gradient(circle at 100% 0%, #1e2f56 0%, transparent 30%),
        linear-gradient(180deg,var(--bg2),var(--bg));
    }

.container{max-width:1220px;margin:0 auto;padding:16px}
    .topbar{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;
      margin-bottom:14px;
    }

.brand{display:flex;align-items:center;gap:10px}
    .brand .icon{color:var(--green);font-size:22px;font-weight:800}
    .brand h1{font-size:24px;line-height:1}
    .brand p{font-size:12px;color:var(--muted);margin-top:2px}

.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    select, button{
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px 12px;
      background:var(--panel);
      color:var(--text);
      font-weight:600;
      cursor:pointer;
    }
    button:hover{filter:brightness(1.08)}
    .btn-green{background:#166534;border-color:#1f7a40}
    .btn-red{background:#5f1c24;border-color:#8a2d3a}

.grid4{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-bottom:14px;
    }
    .card{
      border:1px solid var(--line);
      border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      padding:14px;
    }
    .card .label{font-size:12px;color:var(--muted)}
    .card .val{font-size:28px;font-weight:800;margin-top:5px}
    .ok{color:#9dffbf}
    .warn{color:#ffdca3}
    .bad{color:#ffc9c9}

.layout{
      display:grid;
      grid-template-columns:1.15fr .85fr;
      gap:12px;
    }

.section-title{
      font-size:18px;
      margin-bottom:10px;
    }

.result-box .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:8px;
    }
    .pill{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      border-radius:10px;
      padding:10px;
      font-size:13px;
      color:var(--muted);
    }
    .pill strong{display:block;color:var(--text);font-size:17px;margin-top:4px}

table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:12px;
      margin-top:8px;
      border:1px solid var(--line);
    }
    thead{background:rgba(59,130,246,.15)}
    th, td{
      padding:10px 8px;
      text-align:left;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:14px;
    }
    th{font-size:13px;color:#c8d9ff}
    tbody tr:hover{background:rgba(255,255,255,.03)}
    .rank-chip{
      display:inline-block;
      min-width:30px;
      text-align:center;
      border-radius:999px;
      font-weight:700;
      padding:4px 8px;
      background:rgba(255,255,255,.08);
    }
    .rank-1{background:rgba(245,158,11,.20);color:#ffdf9e}
    .rank-2{background:rgba(156,163,175,.20);color:#e5e7eb}
    .rank-3{background:rgba(180,83,9,.20);color:#ffd2a8}

.you{
      color:#b5ffd1;
      font-weight:700;
    }

.bar-wrap{
      margin-top:10px;
      display:grid;
      gap:10px;
    }
    .bar-row{
      display:grid;
      grid-template-columns:120px 1fr 60px;
      gap:8px;
      align-items:center;
      font-size:13px;
      color:var(--muted);
    }
    .bar{
      height:10px;
      border-radius:999px;
      background:#243758;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
    }
    .bar > span{
      height:100%;
      display:block;
      border-radius:999px;
    }
    .b-phy{background:linear-gradient(90deg,#1d4ed8,#60a5fa)}
    .b-chem{background:linear-gradient(90deg,#b45309,#f59e0b)}
    .b-math{background:linear-gradient(90deg,#6d28d9,#a78bfa)}
    .b-mixed{background:linear-gradient(90deg,#0f766e,#2dd4bf)}

.empty{
      border:1px dashed var(--line);
      border-radius:12px;
      padding:16px;
      color:var(--muted);
      text-align:center;
      margin-top:8px;
    }

.footer{
      margin-top:14px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
    }

@media(max-width:1020px){
      .grid4{grid-template-columns:repeat(2,1fr)}
      .layout{grid-template-columns:1fr}
    }
    @media(max-width:620px){
      .grid4{grid-template-columns:1fr}
      .bar-row{grid-template-columns:95px 1fr 50px}
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div class="brand">
        <div class="icon">&lt;/&gt;</div>
        <div>
          <h1>PrepCode</h1>
          <p>LeetCode for JEE • Contest Results</p>
        </div>
      </div>

<div class="controls">
        <select id="contestSelect"></select>
        <button id="exportBtn" class="btn-green">Export Selected JSON</button>
        <button id="clearBtn" class="btn-red">Delete My Submission</button>
      </div>
    </header>

<section class="grid4">
      <article class="card">
        <div class="label">Your Score</div>
        <div class="val ok" id="scoreVal">0</div>
      </article>
      <article class="card">
        <div class="label">Your Rank</div>
        <div class="val" id="rankVal">-</div>
      </article>
      <article class="card">
        <div class="label">Accuracy</div>
        <div class="val warn" id="accVal">0%</div>
      </article>
      <article class="card">
        <div class="label">Attempted</div>
        <div class="val" id="attemptVal">0/0</div>
      </article>
    </section>

<section class="layout">
      <article class="card result-box">
        <h3 class="section-title">Your Performance</h3>
        <div class="row">
          <div class="pill">Contest<strong id="contestName">-</strong></div>
          <div class="pill">Submitted At<strong id="submittedAt">-</strong></div>
          <div class="pill">Correct<strong id="correctVal">0</strong></div>
          <div class="pill">Wrong<strong id="wrongVal">0</strong></div>
          <div class="pill">Unattempted<strong id="unattemptVal">0</strong></div>
          <div class="pill">Max Score<strong id="maxVal">0</strong></div>
        </div>

<h3 class="section-title" style="margin-top:14px;">Subject-wise Score %</h3>
        <div class="bar-wrap" id="subjectBars"></div>
      </article>

<article class="card">
        <h3 class="section-title">Leaderboard</h3>
        <div id="leaderboardWrap"></div>
      </article>
    </section>

<p class="footer" id="footerText">Live source: <strong>contest_submissions</strong></p>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>

<script>
    (() => {
      "use strict";

const RESULT_KEY = "prepcode_contest_results";
      const SELECTED_CONTEST_KEY = "prepcode_selected_contest";
      const SELECTED_CONTEST_META_KEY = "prepcode_selected_contest_meta";
      const LAST_SUBMITTED_KEY = "prepcode_last_submitted_contest";

// Prep Coins keys (same family as index page)
      const COIN_WALLET_PREFIX = "prepcode_wallet_v1_";
      const COIN_LEDGER_PREFIX = "prepcode_coin_ledger_v1_";

const contestSelect = document.getElementById("contestSelect");
      const exportBtn = document.getElementById("exportBtn");
      const clearBtn = document.getElementById("clearBtn");
      const footerText = document.getElementById("footerText");

const scoreVal = document.getElementById("scoreVal");
      const rankVal = document.getElementById("rankVal");
      const accVal = document.getElementById("accVal");
      const attemptVal = document.getElementById("attemptVal");

const contestName = document.getElementById("contestName");
      const submittedAt = document.getElementById("submittedAt");
      const correctVal = document.getElementById("correctVal");
      const wrongVal = document.getElementById("wrongVal");
      const unattemptVal = document.getElementById("unattemptVal");
      const maxVal = document.getElementById("maxVal");

const subjectBars = document.getElementById("subjectBars");
      const leaderboardWrap = document.getElementById("leaderboardWrap");

let sbClient = null;
      let currentUser = null;
      let YOU = "PrepCoder";
      let allResults = [];
      let selectedContestId = null;
      let liveChannel = null;
      let contestTitleMap = new Map();
      let contestEndMap = new Map(); // NEW: for end-time gating
      let usingLiveSupabase = true;

function getSupabaseClient() {
        return window.PC?.supabase || window.sb || null;
      }

function isUuid(v) {
        return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(v || ""));
      }

function formatDate(iso) {
        if (!iso) return "-";
        const d = new Date(iso);
        return d.toLocaleString([], {
          day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit"
        });
      }

function resetSummaryCards() {
        scoreVal.textContent = "0";
        rankVal.textContent = "-";
        accVal.textContent = "0%";
        attemptVal.textContent = "0/0";
        contestName.textContent = "-";
        submittedAt.textContent = "-";
        correctVal.textContent = "0";
        wrongVal.textContent = "0";
        unattemptVal.textContent = "0";
        maxVal.textContent = "0";
        subjectBars.innerHTML = `<div class="empty">No data.</div>`;
      }

function subjectBreakdown(result) {
        const totalPct = result.maxScore ? (result.score / result.maxScore) * 100 : 0;
        const name = (result.contestName || "").toLowerCase();

let phy = totalPct, chem = totalPct, math = totalPct, mixed = totalPct;

if (name.includes("physics")) {
          phy = totalPct; chem = Math.max(0, totalPct - 12); math = Math.max(0, totalPct - 10); mixed = Math.max(0, totalPct - 8);
        } else if (name.includes("chem")) {
          chem = totalPct; phy = Math.max(0, totalPct - 10); math = Math.max(0, totalPct - 12); mixed = Math.max(0, totalPct - 8);
        } else if (name.includes("math")) {
          math = totalPct; phy = Math.max(0, totalPct - 10); chem = Math.max(0, totalPct - 12); mixed = Math.max(0, totalPct - 8);
        } else {
          phy = Math.max(0, Math.min(100, totalPct + 2));
          chem = Math.max(0, Math.min(100, totalPct - 1));
          math = Math.max(0, Math.min(100, totalPct + 1));
          mixed = totalPct;
        }

return [
          { key: "Physics", val: Math.round(phy), cls: "b-phy" },
          { key: "Chemistry", val: Math.round(chem), cls: "b-chem" },
          { key: "Mathematics", val: Math.round(math), cls: "b-math" },
          { key: "Mixed", val: Math.round(mixed), cls: "b-mixed" }
        ];
      }

function resolveSelectedContestId() {
        const urlId = new URLSearchParams(window.location.search).get("contestId");
        if (isUuid(urlId)) return urlId;

const raw = localStorage.getItem(SELECTED_CONTEST_KEY);
        if (isUuid(raw)) return raw;

try {
          const parsed = JSON.parse(raw || "{}");
          if (isUuid(parsed.id)) return parsed.id;
          if (isUuid(parsed.contest_id)) return parsed.contest_id;
        } catch {}

try {
          const meta = JSON.parse(localStorage.getItem(SELECTED_CONTEST_META_KEY) || "{}");
          if (isUuid(meta.id)) return meta.id;
        } catch {}

const last = localStorage.getItem(LAST_SUBMITTED_KEY);
        if (isUuid(last)) return last;

return null;
      }

async function getAuthUser() {
        if (window.PC?.getUser) return await window.PC.getUser();
        const { data } = await sbClient.auth.getUser();
        return data?.user || null;
      }

function uniqueContests(results) {
        const map = new Map();
        results.forEach(r => {
          const id = String(r.contestId || "");
          const name = String(r.contestName || "Untitled Contest");
          if (!id) return;
          if (!map.has(id)) map.set(id, { contestId: id, contestName: name });
        });
        return [...map.values()];
      }

function getContestResults(contestId) {
        return allResults.filter(r => String(r.contestId) === String(contestId));
      }

function sortLeaderboard(rows) {
        return rows.slice().sort((a, b) => {
          if (Number(b.score || 0) !== Number(a.score || 0)) return Number(b.score || 0) - Number(a.score || 0);
          return new Date(a.submittedAt || 0) - new Date(b.submittedAt || 0);
        });
      }

function addRanks(sortedRows) {
        return sortedRows.map((row, i) => ({ ...row, rank: i + 1 }));
      }

function getYouRow(rankedRows) {
        if (!rankedRows.length) return null;

if (currentUser?.id) {
          const mineById = rankedRows.filter(r => String(r.userId) === String(currentUser.id));
          if (mineById.length) {
            return mineById.sort((a,b) => new Date(b.submittedAt || 0) - new Date(a.submittedAt || 0))[0];
          }
        }

const mineByName = rankedRows.filter(r => r.user === YOU);
        if (!mineByName.length) return null;
        return mineByName.sort((a,b) => new Date(b.submittedAt || 0) - new Date(a.submittedAt || 0))[0];
      }

function persistSelectedContest(id, name = "") {
        if (!isUuid(id)) return;
        localStorage.setItem(SELECTED_CONTEST_KEY, id);
        localStorage.setItem(SELECTED_CONTEST_META_KEY, JSON.stringify({ id, title: name }));
      }

function persistRatingBridge(contestId, ranked, me, fallbackContestName = "") {
        if (!isUuid(contestId) || !me) return;

const totalParticipants = Number(ranked?.length || 0);

localStorage.setItem(`prepcode_contest_result_${contestId}`, JSON.stringify({
          contestId,
          contestName: me.contestName || fallbackContestName || "Untitled Contest",
          rank: Number(me.rank || 0),
          totalParticipants,
          participants: totalParticipants,
          score: Number(me.score || 0),
          submittedAt: me.submittedAt || new Date().toISOString(),
          userId: me.userId || null
        }));

localStorage.setItem(`prepcode_leaderboard_${contestId}`, JSON.stringify({
          contestId,
          totalParticipants,
          leaderboard: (ranked || []).map(r => ({
            rank: Number(r.rank || 0),
            user_id: r.userId || null,
            name: r.user || "User",
            score: Number(r.score || 0),
            submittedAt: r.submittedAt || null
          }))
        }));

localStorage.setItem(LAST_SUBMITTED_KEY, contestId);
      }

function clearRatingBridge(contestId) {
        if (!contestId) return;
        localStorage.removeItem(`prepcode_contest_result_${contestId}`);
        localStorage.removeItem(`prepcode_leaderboard_${contestId}`);
      }

// =========================
      // Prep Coins (rank rewards)
      // =========================
      function getCoinWalletKey(userId) {
        return `${COIN_WALLET_PREFIX}${userId}`;
      }

function getCoinLedgerKey(userId) {
        return `${COIN_LEDGER_PREFIX}${userId}`;
      }

function readWallet(userId) {
        try {
          return JSON.parse(localStorage.getItem(getCoinWalletKey(userId))) || { coins: 0, updatedAt: null };
        } catch {
          return { coins: 0, updatedAt: null };
        }
      }

function writeWallet(userId, wallet) {
        localStorage.setItem(getCoinWalletKey(userId), JSON.stringify(wallet));
      }

function readLedger(userId) {
        try {
          return JSON.parse(localStorage.getItem(getCoinLedgerKey(userId))) || {};
        } catch {
          return {};
        }
      }

function writeLedger(userId, ledger) {
        localStorage.setItem(getCoinLedgerKey(userId), JSON.stringify(ledger));
      }

function contestCoinsByRank(rank) {
        const r = Number(rank || 0);
        if (r === 1) return 90;
        if (r === 2) return 70;
        if (r === 3) return 55;
        if (r >= 4 && r <= 10) return 40;
        if (r >= 11 && r <= 50) return 30;
        if (r >= 51 && r <= 100) return 25;
        return 0;
      }

function awardContestCoinsOnce({ userId, contestId, rank, participants }) {
        if (!userId || !contestId) return { granted: false, amount: 0 };

const amount = contestCoinsByRank(rank);
        if (amount <= 0) return { granted: false, amount: 0 };

const ledger = readLedger(userId);
        const key = `contest_rank_${contestId}`;
        if (ledger[key]) return { granted: false, amount };

const wallet = readWallet(userId);
        wallet.coins = Math.max(0, Number(wallet.coins || 0) + amount);
        wallet.updatedAt = new Date().toISOString();
        writeWallet(userId, wallet);

ledger[key] = {
          reason: "Contest rank reward",
          amount,
          contestId,
          rank: Number(rank || 0),
          participants: Number(participants || 0),
          at: new Date().toISOString()
        };
        writeLedger(userId, ledger);

return { granted: true, amount };
      }

// NEW: award only after contest end
      function isContestEnded(contestId) {
        const endMs = contestEndMap.get(String(contestId || ""));
        if (!Number.isFinite(endMs)) return false; // unknown => do not award
        return Date.now() >= endMs;
      }

function renderContestOptions() {
        const contests = uniqueContests(allResults);
        if (!contests.length) {
          contestSelect.innerHTML = `<option value="">No contests found</option>`;
          selectedContestId = null;
          return;
        }

contestSelect.innerHTML = contests
          .map(c => `<option value="${c.contestId}">${c.contestName}</option>`)
          .join("");

if (!selectedContestId || !contests.some(c => c.contestId === selectedContestId)) {
          selectedContestId = contests[0].contestId;
        }

contestSelect.value = selectedContestId;
        const selectedMeta = contests.find(c => c.contestId === selectedContestId);
        if (selectedMeta) persistSelectedContest(selectedMeta.contestId, selectedMeta.contestName);
      }

function renderPage() {
        if (!selectedContestId) {
          resetSummaryCards();
          leaderboardWrap.innerHTML = `<div class="empty">No result data available yet.</div>`;
          return;
        }

const rows = getContestResults(selectedContestId);
        if (!rows.length) {
          resetSummaryCards();
          leaderboardWrap.innerHTML = `<div class="empty">No results for this contest yet.</div>`;
          return;
        }

const ranked = addRanks(sortLeaderboard(rows));
        const me = getYouRow(ranked);

leaderboardWrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Rank</th>
                <th>User</th>
                <th>Score</th>
                <th>Accuracy</th>
                <th>Attempted</th>
              </tr>
            </thead>
            <tbody>
              ${ranked.map(r => {
                const rankClass = r.rank === 1 ? "rank-1" : r.rank === 2 ? "rank-2" : r.rank === 3 ? "rank-3" : "";
                const isYou = (currentUser?.id && String(r.userId) === String(currentUser.id)) || r.user === YOU;
                return `
                  <tr>
                    <td><span class="rank-chip ${rankClass}">#${r.rank}</span></td>
                    <td class="${isYou ? "you" : ""}">${r.user}${isYou ? " (You)" : ""}</td>
                    <td>${Number(r.score || 0)}</td>
                    <td>${r.accuracy || "0.00"}%</td>
                    <td>${Number(r.attempted || 0)}/${Number(r.totalQuestions || 0)}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        `;

if (!me) {
          scoreVal.textContent = "-";
          rankVal.textContent = "-";
          accVal.textContent = "-";
          attemptVal.textContent = "-";
          contestName.textContent = rows[0].contestName || "-";
          submittedAt.textContent = "-";
          correctVal.textContent = "-";
          wrongVal.textContent = "-";
          unattemptVal.textContent = "-";
          maxVal.textContent = "-";
          subjectBars.innerHTML = `<div class="empty">No result for your user in this contest yet.</div>`;
          return;
        }

scoreVal.textContent = `${Number(me.score || 0)}`;
        rankVal.textContent = `#${me.rank}`;
        accVal.textContent = `${me.accuracy || "0.00"}%`;
        attemptVal.textContent = `${Number(me.attempted || 0)}/${Number(me.totalQuestions || 0)}`;

contestName.textContent = me.contestName || "-";
        submittedAt.textContent = formatDate(me.submittedAt);
        correctVal.textContent = Number(me.correct || 0);
        wrongVal.textContent = Number(me.wrong || 0);
        unattemptVal.textContent = Number(me.unattempted || 0);
        maxVal.textContent = Number(me.maxScore || 0);

const bars = subjectBreakdown(me);
        subjectBars.innerHTML = bars.map(b => `
          <div class="bar-row">
            <span>${b.key}</span>
            <div class="bar"><span class="${b.cls}" style="width:${Math.max(0, Math.min(100,b.val))}%"></span></div>
            <strong>${b.val}%</strong>
          </div>
        `).join("");

// Bridge for contest-home rating system
        persistRatingBridge(selectedContestId, ranked, me, rows[0]?.contestName || "");

// Award rank-based Prep Coins once per contest ONLY after contest ended
        if (currentUser?.id && isUuid(selectedContestId)) {
          if (isContestEnded(selectedContestId)) {
            const coinRes = awardContestCoinsOnce({
              userId: currentUser.id,
              contestId: selectedContestId,
              rank: Number(me.rank || 0),
              participants: Number(ranked.length || 0)
            });

if (coinRes.granted) {
              footerText.innerHTML =
                `Live source: <strong>contest_submissions</strong> • Final rank reward: <strong>+${coinRes.amount} Prep Coins</strong>`;
            }
          } else {
            footerText.innerHTML =
              `Live source: <strong>contest_submissions</strong> • Coins unlock after contest ends.`;
          }
        }
      }

// UPDATED: also fetch end-time related fields
      async function loadContestTitleMap(contestIds) {
        contestTitleMap = new Map();
        contestEndMap = new Map();
        if (!contestIds.length) return;

const { data, error } = await sbClient
          .from("contests")
          .select("id,title,starts_at,start_time,start_at,ends_at,end_time,end_at,duration_min,duration")
          .in("id", contestIds);

if (error) return;

(data || []).forEach(c => {
          const id = String(c.id || "");
          if (!id) return;

contestTitleMap.set(id, c.title || "Untitled Contest");

const startsAt = c.starts_at || c.start_time || c.start_at || null;
          const directEnd = c.ends_at || c.end_time || c.end_at || null;
          const durationMin = Number(c.duration_min ?? c.duration ?? 0);

let endMs = null;
          if (directEnd) {
            endMs = new Date(directEnd).getTime();
          } else if (startsAt && durationMin > 0) {
            endMs = new Date(startsAt).getTime() + durationMin * 60000;
          }

if (Number.isFinite(endMs) && endMs > 0) {
            contestEndMap.set(id, endMs);
          }
        });
      }

async function loadLiveResultsFromSupabase() {
        const { data, error } = await sbClient
          .from("contest_submissions")
          .select("contest_id,user_id,user_name,score,max_score,accuracy,attempted,total_questions,correct,wrong,unattempted,submitted_at")
          .order("submitted_at", { ascending: false });

if (error) throw error;

const rows = data || [];
        const contestIds = [...new Set(rows.map(r => r.contest_id).filter(Boolean))];
        await loadContestTitleMap(contestIds);

allResults = rows.map(r => ({
          contestId: r.contest_id,
          contestName: contestTitleMap.get(r.contest_id) || "Untitled Contest",
          user: r.user_name || "User",
          userId: r.user_id,
          submittedAt: r.submitted_at,
          totalQuestions: Number(r.total_questions || 0),
          correct: Number(r.correct || 0),
          wrong: Number(r.wrong || 0),
          unattempted: Number(r.unattempted || 0),
          attempted: Number(r.attempted || 0),
          score: Number(r.score || 0),
          maxScore: Number(r.max_score || 0),
          accuracy: Number(r.accuracy || 0).toFixed(2)
        }));
      }

function loadLocalFallbackResults() {
        const raw = localStorage.getItem(RESULT_KEY);
        if (!raw) return [];
        try {
          const arr = JSON.parse(raw);
          return Array.isArray(arr) ? arr : [];
        } catch {
          return [];
        }
      }

function autoFixSelectedContest() {
        if (!allResults.length) return;

const hasRowsForSelected = selectedContestId && getContestResults(selectedContestId).length > 0;
        if (hasRowsForSelected) return;

if (currentUser?.id) {
          const mine = allResults
            .filter(r => String(r.userId) === String(currentUser.id))
            .sort((a,b) => new Date(b.submittedAt || 0) - new Date(a.submittedAt || 0));
          if (mine.length) {
            selectedContestId = mine[0].contestId;
            persistSelectedContest(mine[0].contestId, mine[0].contestName);
            localStorage.setItem(LAST_SUBMITTED_KEY, mine[0].contestId);
            return;
          }
        }

const latest = allResults.slice().sort((a,b) => new Date(b.submittedAt || 0) - new Date(a.submittedAt || 0))[0];
        if (latest?.contestId) {
          selectedContestId = latest.contestId;
          persistSelectedContest(latest.contestId, latest.contestName);
        }
      }

async function refreshDataAndRender() {
        try {
          await loadLiveResultsFromSupabase();
          usingLiveSupabase = true;
          footerText.innerHTML = `Live source: <strong>contest_submissions</strong>`;
        } catch (e) {
          console.error("Live load failed, fallback local:", e?.message || e);
          usingLiveSupabase = false;
          footerText.innerHTML = `Fallback source: <strong>localStorage (${RESULT_KEY})</strong>`;
          allResults = loadLocalFallbackResults();
          contestEndMap = new Map(); // unknown in fallback, so no auto coin grant
        }

autoFixSelectedContest();
        renderContestOptions();
        renderPage();
      }

function unsubscribeLive() {
        if (!sbClient || !liveChannel) return;
        try { sbClient.removeChannel(liveChannel); } catch {}
        liveChannel = null;
      }

function subscribeLiveAll() {
        if (!sbClient || !usingLiveSupabase) return;
        unsubscribeLive();

liveChannel = sbClient
          .channel("contest-submissions-live")
          .on("postgres_changes", { event: "*", schema: "public", table: "contest_submissions" }, async () => {
            await refreshDataAndRender();
          })
          .subscribe();
      }

contestSelect.addEventListener("change", e => {
        selectedContestId = e.target.value || null;
        if (selectedContestId) {
          const selectedName = uniqueContests(allResults).find(c => c.contestId === selectedContestId)?.contestName || "";
          persistSelectedContest(selectedContestId, selectedName);
        }
        renderPage();
      });

exportBtn.addEventListener("click", () => {
        if (!selectedContestId) return alert("No contest selected.");
        const data = getContestResults(selectedContestId);
        if (!data.length) return alert("No results to export for selected contest.");

const selectedName = uniqueContests(allResults).find(c => c.contestId === selectedContestId)?.contestName || selectedContestId;
        const safeName = selectedName.replace(/[^a-z0-9-_]+/gi, "_").slice(0, 60);

const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);

const a = document.createElement("a");
        a.href = url;
        a.download = `${safeName}_results.json`;
        a.click();

URL.revokeObjectURL(url);
      });

clearBtn.addEventListener("click", async () => {
        if (!selectedContestId) return alert("No contest selected.");

if (usingLiveSupabase && sbClient && currentUser) {
          const ok = confirm("Delete your submission for this contest?");
          if (!ok) return;

const { error } = await sbClient
            .from("contest_submissions")
            .delete()
            .eq("contest_id", selectedContestId)
            .eq("user_id", currentUser.id);

if (error) {
            alert(error.message || "Failed to delete submission.");
            return;
          }

clearRatingBridge(selectedContestId);
          await refreshDataAndRender();
          return;
        }

const ok = confirm("Clear local fallback results?");
        if (!ok) return;
        localStorage.removeItem(RESULT_KEY);
        clearRatingBridge(selectedContestId);
        allResults = [];
        renderContestOptions();
        resetSummaryCards();
        leaderboardWrap.innerHTML = `<div class="empty">Results cleared.</div>`;
      });

async function init() {
        selectedContestId = resolveSelectedContestId();
        sbClient = getSupabaseClient();

if (!sbClient) {
          usingLiveSupabase = false;
          footerText.innerHTML = `Fallback source: <strong>localStorage (${RESULT_KEY})</strong>`;
          allResults = loadLocalFallbackResults();
          autoFixSelectedContest();
          renderContestOptions();
          renderPage();
          return;
        }

currentUser = await getAuthUser();
        if (currentUser) {
          YOU = currentUser.email ? currentUser.email.split("@")[0] : "PrepCoder";
        }

await refreshDataAndRender();
        subscribeLiveAll();
      }

window.addEventListener("beforeunload", () => unsubscribeLive());

init().catch(err => {
        console.error("contest-result init error:", err);
        usingLiveSupabase = false;
        footerText.innerHTML = `Fallback source: <strong>localStorage (${RESULT_KEY})</strong>`;
        allResults = loadLocalFallbackResults();
        autoFixSelectedContest();
        renderContestOptions();
        renderPage();
      });
    })();
  </script>
</body>
</html>
